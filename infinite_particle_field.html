<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infinite Particle Field</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            background: linear-gradient(180deg, #1a0a3e 0%, #0a0520 100%);
            width: 100vw;
            height: 100vh;
        }

        .particle-container {
            position: relative;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        .particle-container::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 5, 32, 0.6);
            pointer-events: none;
            z-index: 1;
        }

        .particle {
            position: absolute;
            border-radius: 50%;
            animation: float linear infinite;
            opacity: 0;
        }

        @keyframes float {
            0% {
                transform: translateY(0) translateX(0);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(100vh) translateX(var(--drift));
                opacity: 0;
            }
        }

        /* Color variations matching the image */
        .particle.pink { background: #ff1493; box-shadow: 0 0 8px #ff1493; }
        .particle.magenta { background: #ff00ff; box-shadow: 0 0 8px #ff00ff; }
        .particle.purple { background: #9d00ff; box-shadow: 0 0 8px #9d00ff; }
        .particle.blue { background: #0080ff; box-shadow: 0 0 8px #0080ff; }
        .particle.cyan { background: #00d4ff; box-shadow: 0 0 8px #00d4ff; }
        .particle.deep-purple { background: #6600cc; box-shadow: 0 0 6px #6600cc; }
    </style>
</head>
<body>
    <div class="particle-container" id="particleContainer"></div>

    <script>
        const container = document.getElementById('particleContainer');
        const colors = ['pink', 'magenta', 'purple', 'blue', 'cyan', 'deep-purple'];
        const particleCount = 500;

        function createParticle() {
            const particle = document.createElement('div');
            particle.className = `particle ${colors[Math.floor(Math.random() * colors.length)]}`;
            
            // Random size (2-6px to match the image's dot sizes)
            const size = Math.random() * 4 + 2;
            particle.style.width = `${size}px`;
            particle.style.height = `${size}px`;
            
            // Random starting position
            particle.style.left = `${Math.random() * 100}%`;
            particle.style.top = `${Math.random() * -100}vh`;
            
            // Random animation duration (slower particles fall slower)
            const duration = Math.random() * 15 + 10;
            particle.style.animationDuration = `${duration}s`;
            
            // Random delay
            particle.style.animationDelay = `${Math.random() * -20}s`;
            
            // Random horizontal drift
            const drift = (Math.random() - 0.5) * 100;
            particle.style.setProperty('--drift', `${drift}px`);
            
            container.appendChild(particle);
            
            // Remove and recreate particle after animation completes
            setTimeout(() => {
                particle.remove();
                createParticle();
            }, (duration + 20) * 1000);
        }

        // Initialize particles
        for (let i = 0; i < particleCount; i++) {
            createParticle();
        }

        // Add new particles periodically for density
        setInterval(() => {
            if (container.children.length < particleCount * 2) {
                createParticle();
            }
        }, 200);
    </script>
</body>
</html>
